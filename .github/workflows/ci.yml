name: CI - Webforum

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  tests:

    runs-on: ubuntu-latest

    env:
      BASE_URL: http://127.0.0.1:8000

    steps:

      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: PHP 8.2 installieren
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Composer-Abhängigkeiten installieren
        run: composer install --no-interaction --prefer-dist

      - name: Node.js installieren
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: npm-Abhängigkeiten installieren
        run: npm install

      - name: Playwright Browser installieren
        run: npx playwright install --with-deps chromium

      - name: PHP Entwicklungsserver starten
        run: php -S 127.0.0.1:8000 > /dev/null 2>&1 &
        working-directory: .

      - name: Warten bis Server gestartet ist
        run: sleep 5

      - name: PHPUnit ausführen
        run: vendor/bin/phpunit tests

      - name: Playwright End-to-End-Test ausführen
        run: npx playwright test
      