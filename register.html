<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Registrieren</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white d-flex justify-content-center align-items-center" style="height:100vh;">

<form action="register.php" method="POST" class="bg-secondary p-4 rounded">
  <h3>Registrieren</h3>

  <input type="text" name="username" placeholder="Benutzername" class="form-control mb-3" required>
  <input type="email" name="email" placeholder="E-Mail" class="form-control mb-3" required>
  <input type="password" name="password" placeholder="Passwort" class="form-control mb-3" required>

  <button class="btn btn-light w-100">Registrieren</button>
</form>

</body>
</html>
